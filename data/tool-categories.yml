## Tool-to-category mapping for the bactopia-tools index page.
## The generator (bin/generate-tools-index.py) reads this file and groups tools
## by category. Every MDX file in bactopia-tools/ (except index.mdx) must appear
## here -- the build fails otherwise.

categories:
  - name: Antimicrobial Resistance
    description: >-
      Detect and characterize antimicrobial resistance genes, point mutations,
      and mobilized resistance determinants across bacterial genomes.
    tools:
      - abricate
      - abritamr
      - amrfinderplus
      - mcroni
      - mykrobe
      - rgi
      - tbprofiler

  - name: Annotation
    description: >-
      Annotate genome features including genes, proteins, functional domains,
      prophages, and defense systems.
    tools:
      - bakta
      - defensefinder
      - eggnog
      - gamma
      - phispy
      - prokka

  - name: Assembly Quality
    description: >-
      Evaluate genome assembly completeness, contamination, and overall
      quality metrics.
    tools:
      - busco
      - checkm
      - checkm2
      - quast

  - name: BLAST
    description: >-
      Search nucleotide and protein sequences against BLAST databases using
      all five standard BLAST programs.
    tools:
      - blastn
      - blastp
      - blastx
      - tblastn
      - tblastx

  - name: Comparative Genomics
    description: >-
      Compare genomes through distance estimation, average nucleotide identity,
      variant calling, pangenome analysis, and phylogenetic tree construction.
    tools:
      - fastani
      - mashdist
      - mashtree
      - pangenome
      - snippy

  - name: Metagenomics & Taxonomy
    description: >-
      Classify reads taxonomically, estimate species abundances in metagenomic
      samples, and remove contaminant sequences.
    tools:
      - bracken
      - gtdb
      - kraken2
      - midas
      - scrubber
      - sylph

  - name: Plasmids & Mobile Elements
    description: >-
      Identify, reconstruct, and type plasmids and insertion sequences from
      bacterial genome assemblies.
    tools:
      - ismapper
      - mobsuite
      - plasmidfinder

  - name: Typing
    description: >-
      Perform multi-locus sequence typing (MLST), phylotyping, and other
      general sequence-based typing methods.
    tools:
      - ariba
      - gigatyper
      - mlst

  - name: Serotyping & Species-Specific Analysis
    description: >-
      Predict serotypes, serogroups, and perform species-specific characterization
      including specialized typing, virulence screening, and lineage assignment.
      Many of these tools can be automatically selected and run with
      [merlin](/bactopia-tools/merlin) based on species identification.
    tools:
      - agrvate
      - btyper3
      - clermontyping
      - ectyper
      - emmtyper
      - genotyphi
      - hicap
      - hpsuissero
      - kleborate
      - legsta
      - lissero
      - meningotype
      - merlin
      - ngmaster
      - pasty
      - pbptyper
      - pneumocat
      - sccmec
      - seqsero2
      - seroba
      - shigapass
      - shigatyper
      - shigeifinder
      - sistr
      - spatyper
      - ssuissero
      - staphtyper
      - stecfinder
